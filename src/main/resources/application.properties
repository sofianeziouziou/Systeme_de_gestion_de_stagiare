spring.application.name=sims
spring.data.mongodb.uri=mongodb://localhost:27017/hikma_stagiaires
spring.data.mongodb.auto-index-creation=true
spring.cache.type=simple
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.jwt.secret=hikma-super-secret-key-change-in-production-must-be-256-bits-long
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000
app.upload-dir=uploads
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:8082
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
logging.level.com.hikma.stagiaires=DEBUG
logging.level.org.springframework.security=WARN